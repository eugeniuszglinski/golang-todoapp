        "404":
          description: User not found
          schema:
            $ref: '#/definitions/github_com_eugeniuszglinski_golang-todoapp_internal_core_transport_http_response.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/github_com_eugeniuszglinski_golang-todoapp_internal_core_transport_http_response.ErrorResponse'
      summary: Delete user
      tags:
